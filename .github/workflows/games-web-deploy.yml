name: Deploy games-web Container

on:
  push:
    branches: [main]
    paths:
      - "apps/games-web/**"
      - "packages/lib/**"
      - "packages/ui/**"
      - "packages/tailwind-config/**"
      - "packages/typescript-config/**"
      - "packages/eslint-config/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: deploy-games-web
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/games-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name lowercase
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/games-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bunny's official BunnyWay/actions/container-update-image@main is a
      # single-shot fetch that throws an UnhandledPromiseRejection on 5xx
      # responses, which we've seen multiple times. Replace it with a curl
      # loop that retries on transient errors.
      - name: Update Magic Container
        if: vars.BUNNY_GAMES_WEB_APP_ID != ''
        env:
          APP_ID: ${{ vars.BUNNY_GAMES_WEB_APP_ID }}
          API_KEY: ${{ secrets.BUNNY_ACCOUNT_API_KEY }}
          CONTAINER_NAME: ${{ vars.BUNNY_GAMES_WEB_CONTAINER_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          # 1. Look up containerId by name
          APP_JSON=$(curl -fsS \
            -H "AccessKey: $API_KEY" \
            "https://api.bunny.net/mc/apps/$APP_ID")
          CONTAINER_ID=$(echo "$APP_JSON" \
            | jq -r --arg n "$CONTAINER_NAME" \
                '.containerTemplates[] | select(.name == $n) | .id')
          if [ -z "$CONTAINER_ID" ] || [ "$CONTAINER_ID" = "null" ]; then
            echo "Container '$CONTAINER_NAME' not found in app $APP_ID" >&2
            exit 1
          fi
          echo "Updating container '$CONTAINER_NAME' ($CONTAINER_ID) → $IMAGE_TAG"

          # 2. PATCH with retry on 5xx
          BODY=$(jq -nc \
            --arg id "$CONTAINER_ID" \
            --arg tag "$IMAGE_TAG" \
            '{id: $id, imageTag: $tag}')

          for attempt in 1 2 3 4 5; do
            HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
              -X PATCH \
              -H "AccessKey: $API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "https://api.bunny.net/mc/apps/$APP_ID/containers/$CONTAINER_ID")

            if [ "$HTTP" = "200" ] || [ "$HTTP" = "204" ]; then
              echo "Update succeeded on attempt $attempt"
              exit 0
            fi

            echo "Attempt $attempt: HTTP $HTTP"
            cat /tmp/resp.txt
            echo
            # Retry on 5xx and 429; bail on 4xx (other than 429)
            if [ "$HTTP" -lt 500 ] && [ "$HTTP" != "429" ]; then
              echo "Non-retryable error, giving up" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

          echo "Update failed after 5 attempts" >&2
          exit 1
